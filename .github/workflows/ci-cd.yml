name: CI/CD

on:
  pull_request:
    branches:
      - main

jobs:
  buildAndTest:
    name: CI Pipeline
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DB_HOST: localhost
      POSTGRES_USER: test
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2

      - name: Set up PostgreSQL
        uses: Harmon758/postgresql-action@v1
        with:
          postgresql version: '17.6'
          postgresql db: ${{ env.POSTGRES_DB }}
          postgresql user: ${{ env.POSTGRES_USER }}
          postgresql password: ${{ env.POSTGRES_PASSWORD }}

      - name: Install Angular dependencies
        run: npm ci

      - name: Run Angular Tests
        run: npm run test:coverage

      - name: Install Express dependencies
        run: npm --prefix ./server ci

      - name: Run Linting
        run: npm --prefix ./server run lint

      - name: Run Migration
        run: npm --prefix ./server run migrate

      - name: Run Express Tests
        run: npm --prefix ./server run coverage


  push:
    runs-on: ubuntu-latest
    needs: buildAndTest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: winx-app
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


  deploy:
    runs-on: ubuntu-latest
    needs: push

    env:
      ECR_REGISTRY: 664047078509.dkr.ecr.eu-west-2.amazonaws.com
      ECR_REPOSITORY: winx-app
      IMAGE_TAG: latest
      S3_DEPLOY_BUCKET: winx-app-bucket
      ELASTIC_BEANSTALK_APP_NAME: winx-task-listing-app
      ELASTIC_BEANSTALK_ENV_NAME: winx-task-listing-app-environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Make script executable
        run: chmod +x ./aws/create_dockerrun.sh

      - name: Create Dockerrun.aws.json
        run: ./aws/create_dockerrun.sh
        env:
          CONTAINER_REGISTRY_URL: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}

      - name: Verify Dockerrun file exists
        run: ls -lah

      - name: Upload Dockerrun to S3
        run: aws s3 cp Dockerrun.aws.json s3://$S3_DEPLOY_BUCKET/

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "$ELASTIC_BEANSTALK_APP_NAME" \
            --version-label "$GITHUB_SHA" \
            --source-bundle S3Bucket="$S3_DEPLOY_BUCKET",S3Key="Dockerrun.aws.json"

          aws elasticbeanstalk update-environment \
            --application-name "$ELASTIC_BEANSTALK_APP_NAME" \
            --environment-name "$ELASTIC_BEANSTALK_ENV_NAME" \
            --version-label "$GITHUB_SHA"